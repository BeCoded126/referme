<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ReferMe">
<meta name="color-scheme" content="light only">
<title>ReferMe — Behavioral Health Referral Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&family=Product+Sans:wght@400&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Product Sans';
  src: url('https://fonts.gstatic.com/s/productsans/v5/HYvgU2fE2nRJvZ5JFAumwegdm0LZdjqr5-oayXSOefg.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;
  --surface:#FFFFFF;
  --text:#202124;
  --text-secondary:#5F6368;
  --accent:#1A73E8;
  --accent-light:#E8F0FE;
  --accent-hover:#1967D2;
  --border:#DADCE0;
  --tag-mh:#1A73E8;
  --tag-mh-bg:#E8F0FE;
  --tag-su:#EA4335;
  --tag-su-bg:#FCE8E6;
  --tag-dual:#9334E6;
  --tag-dual-bg:#F3E8FD;
  --tag-ins:#0D652D;
  --tag-ins-bg:#E6F4EA;
  --tag-alf:#E37400;
  --tag-alf-bg:#FEF7E0;
  --shadow:0 1px 2px 0 rgba(60,64,67,0.3),0 1px 3px 1px rgba(60,64,67,0.15);
  --shadow-lg:0 1px 3px 0 rgba(60,64,67,0.3),0 4px 8px 3px rgba(60,64,67,0.15);
  --radius:8px;
  --radius-sm:8px;
  --radius-pill:24px;
  --font-body:'Roboto',sans-serif;
  --font-display:'Google Sans','Roboto',sans-serif;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* Header */
.header{
  background:#FFFFFF;
  padding:48px 20px 8px;
  text-align:center;
}
.header-title{
  font-family:'Product Sans','Google Sans','Roboto',sans-serif;
  font-size:3.2rem;
  font-weight:400;
  letter-spacing:-0.5px;
  line-height:1.15;
  color:var(--text);
}
.header-title span.g-blue{color:#4285F4}
.header-title span.g-red{color:#EA4335}
.header-title span.g-yellow{color:#FBBC04}
.header-title span.g-green{color:#34A853}
.header-sub{
  font-size:0.8rem;
  color:var(--text-secondary);
  margin-top:6px;
  font-weight:400;
  letter-spacing:0.01em;
}

/* Search */
.search-wrap{
  padding:20px 24px 8px;
  background:#FFFFFF;
  max-width:560px;
  margin:0 auto;
}
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:#FFFFFF;
  border:1px solid var(--border);
  border-radius:var(--radius-pill);
  padding:12px 18px;
  box-shadow:none;
  transition:box-shadow .25s;
}
.search-bar:hover{
  box-shadow:0 1px 6px rgba(32,33,36,0.28);
}
.search-bar:focus-within{
  box-shadow:0 1px 6px rgba(32,33,36,0.28);
  border-color:transparent;
}
.search-icon{flex-shrink:0;width:18px;height:18px;color:var(--text-secondary)}
.search-input{
  flex:1;border:none;outline:none;background:none;
  font-size:0.95rem;font-family:var(--font-body);color:var(--text);
}
.search-input::placeholder{color:var(--text-secondary)}
.search-clear{
  flex-shrink:0;width:20px;height:20px;border:none;background:none;
  cursor:pointer;color:var(--text-secondary);padding:0;
  display:none;
}
.search-clear.visible{display:block}

/* Filters */
.filters{
  padding:10px 20px 14px;
  position:sticky;top:0;z-index:80;
  background:#FFFFFF;
  max-height:45vh;
  overflow-y:auto;
  border-bottom:1px solid var(--border);
}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;
  padding:6px 14px;
  border-radius:var(--radius-pill);
  font-size:0.8rem;
  font-weight:500;
  border:1px solid var(--border);
  background:#FFFFFF;
  color:var(--text-secondary);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.filter-chip:hover{background:#F1F3F4}
.filter-chip.active{
  background:var(--accent-light);
  color:var(--accent);
  border-color:var(--accent);
}
.filter-chip.active-mh{background:var(--tag-mh-bg);border-color:var(--tag-mh);color:var(--tag-mh)}
.filter-chip.active-su{background:var(--tag-su-bg);border-color:var(--tag-su);color:var(--tag-su)}
.filter-chip.active-dual{background:var(--tag-dual-bg);border-color:var(--tag-dual);color:var(--tag-dual)}
.filter-chip.active-alf{background:var(--tag-alf-bg);border-color:var(--tag-alf);color:var(--tag-alf)}
.filter-chip.active-pc{background:var(--tag-pc-bg);border-color:var(--tag-pc);color:var(--tag-pc)}
.filter-chip.active-aba{background:var(--tag-aba-bg);border-color:var(--tag-aba);color:var(--tag-aba)}
.filter-chip.active-youth{background:var(--tag-youth-bg);border-color:var(--tag-youth);color:var(--tag-youth)}
.filter-chip.active-np{background:var(--tag-np-bg);border-color:var(--tag-np);color:var(--tag-np)}
.filter-label{
  font-size:0.7rem;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:0.05em;
  color:var(--text-secondary);
  margin-bottom:5px;
}
.filter-section+.filter-section{margin-top:8px}

/* Results */
.results{padding:16px 20px 100px;background:#F8F9FA}
.results-count{
  font-size:0.78rem;
  color:var(--text-secondary);
  margin-bottom:12px;
  font-weight:400;
}

/* Facility Card */
.card{
  background:var(--surface);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:10px;
  box-shadow:0 1px 2px rgba(60,64,67,0.1);
  border:1px solid var(--border);
  transition:box-shadow .2s,transform .15s;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.card:active{box-shadow:var(--shadow)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{
  font-family:var(--font-display);
  font-size:1rem;
  font-weight:500;
  line-height:1.3;
  color:var(--text);
}
.card-diagnosis{
  flex-shrink:0;
  font-size:0.65rem;
  font-weight:500;
  padding:3px 8px;
  border-radius:4px;
  letter-spacing:0.02em;
  white-space:nowrap;
}
.diag-mh{background:var(--tag-mh-bg);color:var(--tag-mh)}
.diag-su{background:var(--tag-su-bg);color:var(--tag-su)}
.diag-dual{background:var(--tag-dual-bg);color:var(--tag-dual)}
.diag-alf{background:var(--tag-alf-bg);color:var(--tag-alf)}
.diag-pc{background:var(--tag-pc-bg);color:var(--tag-pc)}
.diag-aba{background:var(--tag-aba-bg);color:var(--tag-aba)}
.diag-youth{background:var(--tag-youth-bg);color:var(--tag-youth)}
.diag-np{background:var(--tag-np-bg);color:var(--tag-np)}

.card-location{
  font-size:0.82rem;
  color:var(--text-secondary);
  margin-top:4px;
  display:flex;align-items:center;gap:4px;
}
.card-location svg{width:13px;height:13px;flex-shrink:0}

.card-treatments{
  display:flex;flex-wrap:wrap;gap:4px;
  margin-top:10px;
}
.treat-tag{
  font-size:0.68rem;
  padding:3px 8px;
  border-radius:4px;
  background:#F1F3F4;
  color:var(--text-secondary);
  font-weight:500;
}

.card-insurances{margin-top:10px}
.ins-label{
  font-size:0.65rem;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:0.05em;
  color:var(--text-secondary);
  margin-bottom:4px;
}
.ins-tags{display:flex;flex-wrap:wrap;gap:4px}
.ins-tag{
  font-size:0.68rem;
  padding:3px 8px;
  border-radius:4px;
  background:var(--tag-ins-bg);
  color:var(--tag-ins);
  font-weight:500;
}
.ins-tag.unverified{
  background:#FEF7E0;
  color:#B06000;
  border:1px dashed #FBBC04;
}

.card-actions{
  display:flex;gap:8px;margin-top:12px;
  border-top:1px solid var(--border);
  padding-top:12px;
}
.card-btn{
  flex:1;
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 0;
  border-radius:var(--radius-pill);
  font-size:0.78rem;
  font-weight:500;
  text-decoration:none;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn-call{background:var(--accent-light);color:var(--accent)}
.btn-call:active{background:#D2E3FC}
.btn-web{background:#F1F3F4;color:var(--text)}
.btn-web:active{background:#DADCE0}
.card-btn svg{width:14px;height:14px}

/* Detail Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.32);
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{
  position:fixed;bottom:0;left:0;right:0;z-index:201;
  background:var(--surface);
  border-radius:16px 16px 0 0;
  max-height:85dvh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(0.32,0.72,0,1);
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{
  width:32px;height:4px;
  background:#DADCE0;
  border-radius:2px;
  margin:10px auto 0;
}
.modal-content{padding:20px 20px 40px}
.modal-name{
  font-family:var(--font-display);
  font-size:1.25rem;
  font-weight:500;
  line-height:1.3;
  color:var(--text);
}
.modal-addr{font-size:0.85rem;color:var(--text-secondary);margin-top:4px}
.modal-section{margin-top:20px}
.modal-section-title{
  font-size:0.7rem;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:0.05em;
  color:var(--text-secondary);
  margin-bottom:8px;
}
.modal-tags{display:flex;flex-wrap:wrap;gap:5px}
.modal-actions{
  display:flex;gap:10px;margin-top:20px;
}
.modal-action-btn{
  flex:1;
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 0;
  border-radius:var(--radius-pill);
  font-size:0.85rem;
  font-weight:500;
  text-decoration:none;
  border:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.modal-btn-call{background:var(--accent);color:#fff}
.modal-btn-web{background:var(--accent-light);color:var(--accent)}
.modal-btn-call svg,.modal-btn-web svg{width:16px;height:16px}

.verified-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:0.62rem;
  color:var(--accent);
  font-weight:500;
  margin-left:6px;
}
.verified-badge svg{width:11px;height:11px}

/* Empty State */
.empty{
  text-align:center;padding:60px 20px;
}
.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:0.4}
.empty-text{font-size:0.9rem;color:var(--text-secondary);line-height:1.5}

/* Animations */
@keyframes slideUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.card{animation:slideUp .3s ease both}
.card:nth-child(2){animation-delay:.03s}
.card:nth-child(3){animation-delay:.06s}
.card:nth-child(4){animation-delay:.09s}
.card:nth-child(5){animation-delay:.12s}

/* iPhone safe areas & responsive */
@supports(padding: max(0px)) {
  body{
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }
  .header{padding-top:max(48px, calc(env(safe-area-inset-top) + 16px))}
  .results{padding-bottom:max(100px, calc(env(safe-area-inset-bottom) + 80px))}
  .modal-content{padding-bottom:max(40px, calc(env(safe-area-inset-bottom) + 20px))}
}

/* Mobile: <=480px (iPhone SE, 13 mini, 14, 15, 16) */
@media(max-width:480px){
  .header{padding:36px 16px 6px}
  .header-title{font-size:2.4rem}
  .header-sub{font-size:0.7rem}
  .search-wrap{padding:14px 16px 6px}
  .search-bar{padding:10px 14px}
  .search-input{font-size:0.9rem}
  .filters{padding:8px 16px 12px}
  .filter-chip{padding:6px 12px;font-size:0.75rem;min-height:36px}
  .results{padding:12px 16px 100px}
  .card{padding:14px}
  .card-name{font-size:0.95rem}
  .card-location{font-size:0.78rem}
  .card-btn{padding:10px 0;font-size:0.76rem;min-height:40px}
  .modal-content{padding:16px 16px 32px}
  .modal-name{font-size:1.15rem}
  .modal-action-btn{padding:13px 0;font-size:0.82rem;min-height:44px}
}

/* Larger phones: 481-768px (iPhone Pro Max, Plus models) */
@media(min-width:481px) and (max-width:768px){
  .header-title{font-size:2.8rem}
  .search-wrap{max-width:480px}
  .results{max-width:600px;margin:0 auto}
}

/* Tablet / Desktop */
@media(min-width:769px){
  .results{max-width:640px;margin:0 auto}
  .filters{max-width:640px;margin:0 auto;padding-left:0;padding-right:0}
}

/* Prevent text selection on interactive elements */
.filter-chip,.card-btn,.modal-action-btn{-webkit-user-select:none;user-select:none}

/* Smooth scrolling on iOS */
html{-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
</style>

  <div class="filter-section">

  </div>
</div>

<div class="results" id="results">

  <div id="cardContainer"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>

let activeDiagnosis = 'all';
let activeInsurance = 'all';
let activeLOC = 'all';
let activeService = 'all';

// Build insurance filter chips
function buildInsuranceFilters() {
  const allIns = new Set();
  const exclude = ['Self-Pay','Most Private Insurance','Private Insurance','⚠️ Verify — no public list','⚠️ Verify — call office','Call to Verify','Free / Grant-Funded','Private Pay','Most Major Insurance','No Insurance Needed','Sliding Fee Scale'];
  facilities.forEach(f => f.insurances.forEach(i => {
    if (!exclude.includes(i.name)) {
      allIns.add(i.name);
    }
  }));
  const sorted = [...allIns].sort();
  const container = document.getElementById('insuranceFilters');
  let html = '<button class="filter-chip active" data-filter="all" onclick="setInsurance(\'all\',this)">All</button>';
  html += '<button class="filter-chip" data-filter="uninsured" onclick="setInsurance(\'uninsured\',this)" style="border-color:#C4783C;color:#C4783C">🆓 Uninsured</button>';
  sorted.forEach(ins => {
    html += `<button class="filter-chip" data-filter="${ins}" onclick="setInsurance('${ins.replace(/'/g,"\\'")}',this)">${ins}</button>`;
  });
  container.innerHTML = html;
}

function setDiagnosis(val, el) {
  activeDiagnosis = val;
  document.querySelectorAll('#diagnosisFilters .filter-chip').forEach(c => {
    c.classList.remove('active','active-mh','active-su','active-dual','active-alf','active-pc','active-aba','active-youth','active-np');
  });
  if (val === 'Mental Health') el.classList.add('active-mh');
  else if (val === 'Substance Use') el.classList.add('active-su');
  else if (val === 'Dual Diagnosis') el.classList.add('active-dual');
  else if (val === 'Assisted Living') el.classList.add('active-alf');
  else if (val === 'Primary Care') el.classList.add('active-pc');
  else if (val === 'ABA Therapy') el.classList.add('active-aba');
  else if (val === 'Youth Services') el.classList.add('active-youth');
  else if (val === 'Nonprofit') el.classList.add('active-np');
  else el.classList.add('active');
  render();
}

function setInsurance(val, el) {
  activeInsurance = val;
  document.querySelectorAll('#insuranceFilters .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setLOC(val, el) {
  activeLOC = val;
  document.querySelectorAll('#locFilters .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  // Show services filter only when Outpatient is selected
  const svcSection = document.getElementById('servicesSection');
  if (val === 'Outpatient') {
    svcSection.style.display = '';
  } else {
    svcSection.style.display = 'none';
    activeService = 'all';
    document.querySelectorAll('#servicesFilters .filter-chip').forEach(c => c.classList.remove('active'));
    document.querySelector('#servicesFilters .filter-chip[data-filter="all"]').classList.add('active');
  }
  render();
}

function setService(val, el) {
  activeService = val;
  document.querySelectorAll('#servicesFilters .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  render();
}

document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('searchClear').classList.toggle('visible', this.value.length > 0);
  render();
});

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return facilities.filter(f => {
    // Diagnosis filter
    if (activeDiagnosis !== 'all' && f.diagnosis !== activeDiagnosis) return false;
    // Insurance filter
    if (activeInsurance === 'uninsured') {
      if (!f.acceptsUninsured) return false;
    } else if (activeInsurance !== 'all') {
      const hasIns = f.insurances.some(i => i.name === activeInsurance);
      if (!hasIns) return false;
    }
    // Level of Care filter
    if (activeLOC !== 'all') {
      if (!f.loc || !f.loc.includes(activeLOC)) return false;
    }
    // Outpatient Services filter
    if (activeService !== 'all') {
      if (!f.services || !f.services.includes(activeService)) return false;
    }
    // Search
    if (q) {
      const haystack = [
        f.name, f.address, f.city, f.phone, f.focus, f.diagnosis,
        ...f.treatments,
        ...f.insurances.map(i => i.name),
        ...(f.loc || []),
        ...(f.services || [])
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    }
    return true;
  });
}

function diagClass(d) {
  if (d === 'Mental Health') return 'diag-mh';
  if (d === 'Substance Use') return 'diag-su';
  if (d === 'Assisted Living') return 'diag-alf';
  if (d === 'Primary Care') return 'diag-pc';
  if (d === 'ABA Therapy') return 'diag-aba';
  if (d === 'Youth Services') return 'diag-youth';
  if (d === 'Nonprofit') return 'diag-np';
  return 'diag-dual';
}

function diagLabel(d) {
  if (d === 'Dual Diagnosis') return 'Dual Dx';
  if (d === 'Assisted Living') return 'ALF';
  if (d === 'Primary Care') return 'PCP';
  if (d === 'ABA Therapy') return 'ABA';
  if (d === 'Youth Services') return 'Youth';
  if (d === 'Nonprofit') return 'Free';
  return d;
}

function renderCard(f) {
  const insHtml = f.insurances.map(i =>
    `<span class="ins-tag${i.verified ? '' : ' unverified'}">${i.name}${i.verified ? '<span class="verified-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>' : ''}</span>`
  ).join('');

  const uninsuredBadge = f.acceptsUninsured ? '<span style="display:inline-block;font-size:0.65rem;font-weight:600;padding:3px 8px;border-radius:4px;background:#FFF3E8;color:#C4783C;border:1px solid #E8C9A8;margin-left:4px">Accepts Uninsured</span>' : '';

  return `
    <div class="card" onclick="openModal(${f.id})">
      <div class="card-header">
        <div class="card-name">${f.name}</div>
        <span class="card-diagnosis ${diagClass(f.diagnosis)}">${diagLabel(f.diagnosis)}</span>
      </div>
      <div class="card-location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${f.city}, FL ${uninsuredBadge}
      </div>
      <div class="card-treatments">
        ${f.treatments.map(t => `<span class="treat-tag">${t}</span>`).join('')}
      </div>
      <div class="card-insurances">
        <div class="ins-label">Insurances</div>
        <div class="ins-tags">${insHtml}</div>
      </div>
      <div class="card-actions">
        <a class="card-btn btn-call" href="tel:${f.phone.replace(/[^0-9+]/g,'')}" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Call
        </a>
        <a class="card-btn btn-web" href="${f.website}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Website
        </a>
      </div>
    </div>
  `;
}

function render() {
  const filtered = getFiltered();
  const container = document.getElementById('cardContainer');
  const count = document.getElementById('resultsCount');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">No facilities match your filters.<br>Try adjusting your search or filters.</div>
      </div>`;
    count.textContent = '0 results';
  } else {
    container.innerHTML = filtered.map(renderCard).join('');
    count.textContent = `${filtered.length} facilit${filtered.length === 1 ? 'y' : 'ies'}`;
  }
}

    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

// Swipe down to close modal
let touchStartY = 0;
document.querySelector('.modal').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
});
document.querySelector('.modal').addEventListener('touchmove', e => {
  const diff = e.touches[0].clientY - touchStartY;
  if (diff > 80) {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// Init
buildInsuranceFilters();
render();
</script>
